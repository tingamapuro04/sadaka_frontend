# Netlify — Sadaka SPA
# Site → Build settings can stay default; this file is the source of truth.

[build]
  command = "npm ci && npm run build"
  publish = "dist"

# SPA fallback (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Environment variables are set in Netlify UI (or CLI), not in this file:
#   VITE_API_BASE_URL=https://sadaka-api.onrender.com
#   VITE_WITHDRAWAL_MODE=instant
#   VITE_PLATFORM_LOGIN_PATH=/ops/login
#   VITE_PLATFORM_LOGIN_KEY=   (optional)
#
# Full checklist: ../Sadaka_Backend/docs/DEPLOY_RENDER_NETLIFY_NEON.md
# (or copy that doc into your team wiki if repos stay separate)
